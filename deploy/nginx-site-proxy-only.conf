# Nginx — cały ruch na Next.js (port 3000). Brak aliasu /_next/static/ z dysku:
# unikasz rozjazdu ścieżek między buildem a Nginx.
#
# Instalacja (Ubuntu):
#   sudo cp deploy/nginx-site-proxy-only.conf /etc/nginx/sites-available/mrfrik
#   sudo ln -sf /etc/nginx/sites-available/mrfrik /etc/nginx/sites-enabled/mrfrik
#   sudo rm -f /etc/nginx/sites-enabled/default   # jeśli był duplikat listen 80
#   sudo nginx -t && sudo nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
