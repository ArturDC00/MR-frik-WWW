# Nginx — cały ruch na Next.js (port 3000). server_name: mrfrik.com + www.
#
# 1) Instalacja HTTP (przed certyfikatem):
#    sudo cp deploy/nginx-site-proxy-only.conf /etc/nginx/sites-available/mrfrik
#    sudo ln -sf /etc/nginx/sites-available/mrfrik /etc/nginx/sites-enabled/mrfrik
#    sudo nginx -t && sudo nginx -s reload
#
# 2) Gdy DNS A/@ i A/www wskazują ten serwer — Let’s Encrypt:
#    sudo apt update && sudo apt install -y certbot python3-certbot-nginx
#    sudo certbot --nginx -d mrfrik.com -d www.mrfrik.com
#
# 3) Na serwerze w ~/mrfrik/.env.local ustaw:
#    NEXT_PUBLIC_SITE_URL=https://mrfrik.com
#    ENABLE_HSTS=true
#    potem: npm run build && pm2 restart mrfrik

server {
    listen 80;
    listen [::]:80;
    server_name mrfrik.com www.mrfrik.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
