# Nginx — cały ruch na Next.js (mrfrik-www, np. port 3005 — daleko od 3000/3002). server_name: mrfrik.com + www.
#
# HTTP/2 i HTTP/1.1 (Lighthouse „Uses HTTP/1.1 for origin”):
# - Po stronie KLIENT → NGINX musisz mieć TLS z ALPN http/2 (albo QUIC/h3). W bloku SSL użytym przez
#   certbot powinno być co najmniej:  listen 443 ssl http2;  (nginx 1.25+: listen 443 ssl; http2 on;)
#   oraz certyfikat + ssl_certificate_key. Sam plik na porcie 80 nie daje h2 — tylko przekierowanie.
# - proxy_http_version 1.1; między nginx a Node (127.0.0.1:3005) jest POPRAWNE: backend HTTP/1.1.
# - Jeśli Lighthouse nadal pokazuje h1.1 dla mrfrik.com: sprawdź w DevTools → Network → kliknij dokument
#   → Protocol; jeśli h1.1, na serwerze: nginx -T | grep listen; upewnij się że aktywny server { } na 443
#   ma http2. Cloudflare: SSL/TLS → Overview „Full (strict)”; Network → HTTP/2 i HTTP/3 włączone.
# - Vercel: jeśli domena wskazuje na VPS (A record), to Vercel nie terminuje ruchu — HTTP/2 zależy od nginx.
#
# 1) Instalacja HTTP (przed certyfikatem):
#    sudo cp deploy/nginx-site-proxy-only.conf /etc/nginx/sites-available/mrfrik
#    sudo ln -sf /etc/nginx/sites-available/mrfrik /etc/nginx/sites-enabled/mrfrik
#    sudo nginx -t && sudo nginx -s reload
#
# 2) Gdy DNS A/@ i A/www wskazują ten serwer — Let’s Encrypt:
#    sudo apt update && sudo apt install -y certbot python3-certbot-nginx
#    sudo certbot --nginx -d mrfrik.com -d www.mrfrik.com
#
# 3) Na serwerze w ~/mrfrik-www/.env.local (lub .env.production) ustaw:
#    NEXT_PUBLIC_SITE_URL=https://mrfrik.com
#    ENABLE_HSTS=true
#    PORT=3005 pm2 start … — proxy_pass musi wskazywać ten sam port.
#    potem: npm run build && pm2 restart mrfrik-www

server {
    listen 80;
    listen [::]:80;
    server_name mrfrik.com www.mrfrik.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
