<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Tło gradientowe -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020203;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a12;stop-opacity:1"/>
    </linearGradient>
    <!-- Blask pomarańczowy -->
    <radialGradient id="glow" cx="30%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#FD9731;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#FD9731;stop-opacity:0"/>
    </radialGradient>
    <!-- Blask niebieski -->
    <radialGradient id="glow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#4a90e2;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Tło -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Siatka dekoracyjna (subtelne linie) -->
  <g stroke="rgba(253,151,49,0.06)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Linia dekoracyjna górna -->
  <rect x="80" y="80" width="120" height="2" rx="1" fill="#FD9731" opacity="0.7"/>

  <!-- Logo MrFrik (uproszczone — M + R) -->
  <g transform="translate(80, 120)">
    <!-- M -->
    <path d="M0 72V20h6l10 22 10-22h6v52H26V38l-8 18h-4l-8-18v34H0z" fill="#FD9731"/>
    <!-- R -->
    <path d="M38 72V20h13c6.6 0 10.5 3.6 10.5 9.75 0 4.2-2.1 7.5-5.7 9l7.2 33.25H56.25L51.15 57H44v15H38zm6-20.25h5.7c3 0 4.8-1.65 4.8-4.5s-1.8-4.5-4.8-4.5H44v9z" fill="#FD9731"/>
    <!-- Poziomy bar -->
    <rect x="0" y="76" width="62" height="3" rx="1.5" fill="#FD9731" opacity="0.5"/>
  </g>

  <!-- Główny nagłówek -->
  <text x="80" y="280" font-family="'Monument Extended', 'Arial Black', sans-serif" font-size="62" font-weight="800" fill="#F5F5F5" letter-spacing="-1">
    Import Auta
  </text>
  <text x="80" y="360" font-family="'Monument Extended', 'Arial Black', sans-serif" font-size="62" font-weight="800" fill="#FD9731" letter-spacing="-1">
    z USA i Kanady
  </text>

  <!-- Podtytuł -->
  <text x="80" y="430" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="400" fill="rgba(245,245,245,0.7)" letter-spacing="0.3">
    Ponad 1500 sprowadzonych aut · 98% zadowolonych klientów
  </text>

  <!-- Separator -->
  <rect x="80" y="470" width="400" height="1" rx="0.5" fill="rgba(253,151,49,0.3)"/>

  <!-- Statystyki -->
  <g font-family="Inter, Arial, sans-serif" fill="#F5F5F5">
    <!-- Stat 1 -->
    <text x="80" y="520" font-size="36" font-weight="700" fill="#FD9731">1500+</text>
    <text x="80" y="548" font-size="16" font-weight="400" fill="rgba(245,245,245,0.5)">aut sprowadzonych</text>
    <!-- Stat 2 -->
    <text x="280" y="520" font-size="36" font-weight="700" fill="#FD9731">98%</text>
    <text x="280" y="548" font-size="16" font-weight="400" fill="rgba(245,245,245,0.5)">zadowolonych klientów</text>
    <!-- Stat 3 -->
    <text x="460" y="520" font-size="36" font-weight="700" fill="#FD9731">6-10 tyg</text>
    <text x="460" y="548" font-size="16" font-weight="400" fill="rgba(245,245,245,0.5)">czas importu</text>
  </g>

  <!-- CTA -->
  <rect x="730" y="470" width="380" height="72" rx="36" fill="rgba(253,151,49,0.12)" stroke="#FD9731" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="920" y="514" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#FD9731" text-anchor="middle" letter-spacing="1">mrfrik.pl</text>

  <!-- Dekoracyjny okrąg/globus po prawej stronie -->
  <circle cx="950" cy="250" r="200" fill="none" stroke="rgba(253,151,49,0.08)" stroke-width="1"/>
  <circle cx="950" cy="250" r="150" fill="none" stroke="rgba(253,151,49,0.06)" stroke-width="1"/>
  <circle cx="950" cy="250" r="100" fill="none" stroke="rgba(253,151,49,0.10)" stroke-width="1"/>
  <!-- Linie południków -->
  <ellipse cx="950" cy="250" rx="200" ry="80" fill="none" stroke="rgba(253,151,49,0.05)" stroke-width="1"/>
  <ellipse cx="950" cy="250" rx="200" ry="150" fill="none" stroke="rgba(253,151,49,0.04)" stroke-width="1"/>
  <line x1="950" y1="50" x2="950" y2="450" stroke="rgba(253,151,49,0.06)" stroke-width="1"/>
  <line x1="750" y1="250" x2="1150" y2="250" stroke="rgba(253,151,49,0.06)" stroke-width="1"/>
  <!-- Punkt świetlny na globusie -->
  <circle cx="875" cy="200" r="5" fill="#FD9731" opacity="0.8"/>
  <circle cx="875" cy="200" r="12" fill="none" stroke="#FD9731" stroke-width="1" opacity="0.3"/>
  <circle cx="1020" cy="280" r="4" fill="#4a90e2" opacity="0.7"/>

  <!-- Linia dekoracyjna dolna -->
  <rect x="80" y="590" width="1040" height="1" rx="0.5" fill="rgba(253,151,49,0.15)"/>
</svg>
